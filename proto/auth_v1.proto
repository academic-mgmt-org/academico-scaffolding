syntax = "proto3";

package auth.v1;
option php_namespace = "App\\Grpc\\Auth\\V1";
option php_metadata_namespace = "App\\Grpc\\GPBMetadata\\AuthV1";

message LoginRequest {
  string username = 1;

  string password = 2;

  string appVersion = 3;

  string passwordEncoding = 4;
}

message LoginResponse {
  string accessToken = 1;

  string refreshToken = 2;

  bool mfaRequired = 3;

  bool requiresAppUpdate = 4;

  string tokenType = 5;

  int32 expiresIn = 6;

  string sessionId = 7;
}

message RefreshTokenRequest {
  string refreshToken = 1;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token = 1;

  string email = 2;

  string newPassword = 3;

  string passwordEncoding = 4;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool isValid = 1;

  string identifier = 2;

  string email = 3;

  string sessionId = 4;

  string userId = 5;

  string role = 6;
}

message LogoutRequest {
  string token = 1;

  string refreshToken = 2;
}

message GenericResponse {
  bool success = 1;

  string message = 2;
}

message Empty {
}

message HealthResponse {
  string status = 1;

  string service = 2;

  string timestamp = 3;

  double uptime = 4;
}

message ReadyResponse {
  bool ready = 1;

  string timestamp = 2;
}

message LiveResponse {
  bool alive = 1;

  string timestamp = 2;

  double uptime = 3;
}

message WhitelistResponse {
  repeated string routes = 1;
}

service AuthService {
  rpc Login ( LoginRequest ) returns ( LoginResponse );

  rpc RefreshToken ( RefreshTokenRequest ) returns ( LoginResponse );

  rpc ForgotPassword ( ForgotPasswordRequest ) returns ( GenericResponse );

  rpc ResetPassword ( ResetPasswordRequest ) returns ( GenericResponse );

  rpc ValidateToken ( ValidateTokenRequest ) returns ( ValidateTokenResponse );

  rpc Logout ( LogoutRequest ) returns ( GenericResponse );
}

service HealthService {
  rpc Health ( Empty ) returns ( HealthResponse );

  rpc Ready ( Empty ) returns ( ReadyResponse );

  rpc Live ( Empty ) returns ( LiveResponse );
}

service WhitelistService {
  rpc GetAll ( Empty ) returns ( WhitelistResponse );
}
